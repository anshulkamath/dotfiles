set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r h run-shell 'tmux-ops move left'
bind -r j run-shell 'tmux-ops move down'
bind -r k run-shell 'tmux-ops move up'
bind -r l run-shell 'tmux-ops move right'

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r y set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

bind -r m resize-pane -Z

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'

unbind -T copy-mode-vi MouseDragEnd1Pane

set -g mouse on

set-option -g history-limit 10000
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g display-time 2000
set -g display-panes-time 2000
set-option -g default-terminal "tmux-256color"

set-option -sg escape-time 10
set-option -g focus-events on
set-option -a terminal-overrides ",*256col*:RGB"
set-option -g default-shell /bin/zsh

# status bar
set -g status-left '[#S] '
set -g status-right '%H:%M'
set -g status-left-length 20

# background window activity
setw -g monitor-activity on
set -g visual-activity off

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

run '~/.config/tmux/plugins/tpm/tpm'

# popup styling
set -g popup-border-lines rounded
set -g popup-border-style fg=brightblue

# floating scratch terminals — right column
bind g if-shell 'test "#{session_name}" = "scratch"' \
  'split-window -h -c "#{pane_current_path}"' \
  'display-popup -d "#{pane_current_path}" -x R -y 0 -w 40% -h 100% -E "tmux new-session -A -s scratch"'
bind G display-popup -x R -y 0 -w 40% -h 100% -E 'tmux new-session -A -s tmp -c /tmp'

# ctrl+] — project switcher, right column
# to promote a popup to a full session: prefix + s, or detach and switch-client
bind-key -n "C-]" switch-client -T projects
bind-key -T projects n display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s notes -c ~/Developer/personal/notes'
bind-key -T projects . display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s dotfiles -c ~/Developer/public/dotfiles'
bind-key -T projects o display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'dir=$(cd ~/Developer && find . -maxdepth 3 -type d -not -path "*/.*" | sed "s|^\./||" | fzf --prompt=" open in new tab: " --reverse) && [ -n "$dir" ] && kitty @ launch --type=tab --tab-title "$(basename "$dir")" -- tmux new-session -A -s "$(basename "$dir")" -c ~/Developer/"$dir" > /dev/null 2>&1'

# ctrl+\ — claude project switcher
bind-key -n "C-\\" switch-client -T claude-projects
bind-key -T claude-projects n display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s notes-claude -c ~/Developer/personal/notes claude'
bind-key -T claude-projects . display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s dotfiles-claude -c ~/Developer/public/dotfiles claude'
bind-key -T claude-projects f display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s foundry-claude -c ~/Developer/fluidstack/infra/foundry claude'
bind-key -T claude-projects s display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s systems-claude -c ~/Developer/fluidstack/infra/systems claude'
bind-key -T claude-projects a display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'tmux new-session -A -s network-artifacts-claude -c ~/Developer/fluidstack/infra/network-artifacts claude'
bind-key -T claude-projects o display-popup \
    -x R -y 0 -w 40% -h 100% \
    -E 'dir=$(cd ~/Developer && find . -maxdepth 3 -type d -not -path "*/.*" | sed "s|^\./||" | fzf --prompt=" open in claude: " --reverse) && [ -n "$dir" ] && kitty @ launch --type=tab --tab-title "$(basename "$dir")" -- tmux new-session -A -s "claude-$(basename "$dir")" -c ~/Developer/"$dir" claude > /dev/null 2>&1'

# window navigation (screen-style)
bind n next-window
bind N command-prompt -p " new session:" "run-shell 'tmux-new-window \"%%\"'"

# detach current pane into a standalone session
bind D run-shell 'tmux-detach-pane'

# pane/window/session manipulation via fzf
bind P display-popup -E 'tmux-ops pull'        # pull a pane from elsewhere → here
bind S display-popup -E 'tmux-ops send'        # send current pane → elsewhere
bind T display-popup -E 'tmux-ops move-window' # move window → another session
bind W display-popup -E 'tmux-ops swap-window' # swap window order within session

# help menu — custom bindings only
unbind ?
bind ? display-popup -x R -y 0 -w 50% -h 100% -E 'tmux-help'

# rebind keys to clear
bind -n C-space send-keys 'C-l'
